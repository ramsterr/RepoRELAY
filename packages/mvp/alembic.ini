[alembic]
script_location = /Users/ramster/RELAYRecomend/packages/mvp/src/reporelay_mvp/migrations
prepend_sys_path = /Users/ramster/RELAYRecomend/packages/mvp/src
version_table = mvp_alembic_version
sqlalchemy.url = postgresql+psycopg://reporelay:reporelay@localhost:5439/reporelay

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
